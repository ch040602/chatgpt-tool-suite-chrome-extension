<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT Long Chat Loader</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 350px;
      margin: 0;
      padding: 14px;
      font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.2;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 1.2;
    }
    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
    }
    label span { flex: 1; }
    input[type="number"] {
      width: 72px;
      padding: 4px 6px;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    button {
      padding: 5px 8px;
      border: 1px solid color-mix(in srgb, CanvasText 20%, Canvas 80%);
      border-radius: 8px;
      background: Canvas;
      color: CanvasText;
      font: inherit;
      cursor: pointer;
    }
    .doc-row {
      display: flex;
      gap: 8px;
      margin: 8px 0 10px;
    }
    .doc-row button {
      flex: 1;
    }
    .row,
    .metrics {
      border-top: 1px solid color-mix(in srgb, CanvasText 14%, Canvas 86%);
      padding-top: 8px;
      margin-top: 8px;
    }
    .metrics {
      border: 1px solid color-mix(in srgb, CanvasText 14%, Canvas 86%);
      border-radius: 10px;
      padding: 10px;
      background: color-mix(in srgb, Canvas 96%, CanvasText 4%);
    }
    .metric-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .metric-main {
      font-size: 20px;
      line-height: 1.15;
      font-weight: 700;
      margin: 5px 0;
    }
    .metric-sub,
    .metric-line,
    .hint,
    #saved {
      color: color-mix(in srgb, CanvasText 72%, Canvas 28%);
      font-size: 12px;
    }
    .metric-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 5px;
    }
    .metric-line strong {
      text-align: right;
    }
    .hint {
      margin-top: 12px;
    }
    #saved {
      min-height: 16px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>ChatGPT Long Chat Loader</h1>

  <div class="doc-row">
    <button id="openReadme" type="button">English README</button>
    <button id="openReadmeKo" type="button">한국어 README</button>
  </div>

  <section id="metrics" class="metrics" aria-live="polite">
    <div class="metric-top">
      <h2>현재 탭 추정</h2>
      <button id="refreshMetrics" type="button">다시 계산</button>
    </div>
    <div id="metricMain" class="metric-main">계산 중</div>
    <div id="metricSub" class="metric-sub">팝업이 열려 있을 때만 계산합니다.</div>
    <div id="metricLines"></div>
  </section>

  <label>
    <span>확장 기능 사용</span>
    <input id="enabled" type="checkbox">
  </label>

  <label>
    <span>초기 API 응답 줄이기</span>
    <input id="apiTrimEnabled" type="checkbox">
  </label>

  <label>
    <span>CSS 렌더링 containment</span>
    <input id="cssContainmentEnabled" type="checkbox">
  </label>

  <label>
    <span>상태 배지 표시</span>
    <input id="showStatus" type="checkbox">
  </label>

  <label>
    <span>대화 중 자동 정리</span>
    <input id="maintenanceEnabled" type="checkbox">
  </label>

  <label>
    <span>자동 정리 주기(초)</span>
    <input id="maintenanceIntervalSec" type="number" min="10" max="300" step="5">
  </label>

  <div class="row">
    <label>
      <span>처음 표시할 최근 턴</span>
      <input id="visibleTurns" type="number" min="1" max="100" step="1">
    </label>

    <label>
      <span>더 보기 배치</span>
      <input id="loadMoreBatch" type="number" min="1" max="100" step="1">
    </label>

    <label>
      <span>API 사전 보관 배치</span>
      <input id="prefetchBatches" type="number" min="0" max="30" step="1">
    </label>

    <label>
      <span>응답 micro-cache 수</span>
      <input id="apiCacheEntries" type="number" min="1" max="2" step="1">
    </label>

    <label>
      <span>캐시 항목 상한(KB)</span>
      <input id="apiCacheMaxKb" type="number" min="128" max="4096" step="128">
    </label>
  </div>

  <label>
    <span>디버그 로그</span>
    <input id="debug" type="checkbox">
  </label>

  <div class="hint">
    응답 micro-cache는 기본 1개이며 항목당 크기·TTL·메모리 압박 조건으로 제한됩니다. 예상 속도 향상 계산은 팝업을 열 때만 실행됩니다.
  </div>
  <div id="saved"></div>

  <script src="popup.js"></script>
</body>
</html>
