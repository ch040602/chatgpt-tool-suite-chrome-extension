<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT Long Chat Loader</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 350px;
      margin: 0;
      padding: 14px;
      font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 { margin: 0 0 10px; font-size: 15px; line-height: 1.2; }
    h2 { margin: 0 0 8px; font-size: 13px; line-height: 1.2; }
    label { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 10px 0; }
    label span { flex: 1; }
    input[type="number"], input[type="text"], select { width: 82px; padding: 4px 6px; }
    input[type="text"] { width: 190px; font-size: 12px; }
    input[type="checkbox"] { width: 16px; height: 16px; }
    button {
      padding: 5px 8px;
      border: 1px solid color-mix(in srgb, CanvasText 20%, Canvas 80%);
      border-radius: 8px;
      background: Canvas;
      color: CanvasText;
      font: inherit;
      cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .doc-row { display: flex; gap: 8px; margin: 8px 0 10px; }
    .doc-row button { flex: 1; }
    .row, .metrics { border-top: 1px solid color-mix(in srgb, CanvasText 14%, Canvas 86%); padding-top: 8px; margin-top: 8px; }
    .metrics, .update-box {
      border: 1px solid color-mix(in srgb, CanvasText 14%, Canvas 86%);
      border-radius: 10px;
      padding: 10px;
      background: color-mix(in srgb, Canvas 96%, CanvasText 4%);
    }
    .update-box { margin-top: 10px; }
    .metric-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .metric-main { font-size: 20px; line-height: 1.15; font-weight: 700; margin: 5px 0; }
    .metric-sub, .metric-line, #saved, .status-block { color: color-mix(in srgb, CanvasText 72%, Canvas 28%); font-size: 12px; }
    .metric-line, .status-line { display: flex; justify-content: space-between; gap: 10px; margin-top: 5px; }
    .metric-line strong, .status-line strong { text-align: right; overflow-wrap: anywhere; }
    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .status-block { margin-top: 8px; }
    #saved { min-height: 16px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>ChatGPT Long Chat Loader</h1>

  <label>
    <span id="languageModeLabel">프로그램 언어</span>
    <select id="languageMode">
      <option value="ko">한국어</option>
      <option value="en">English</option>
    </select>
  </label>

  <div class="doc-row">
    <button id="openReadme" type="button">Open README</button>
  </div>

  <section class="update-box" aria-live="polite">
    <div class="metric-top">
      <h2 id="updateTitle">업데이트</h2>
      <button id="checkGitUpdate" type="button">업데이트 확인</button>
    </div>
    <div class="button-grid">
      <button id="downloadGitUpdate" type="button" disabled>최신 ZIP 다운로드</button>
    </div>
    <div id="gitUpdateStatus" class="status-block">수동 확인 전입니다.</div>
    <div id="gitUpdateLines" class="status-block"></div>
  </section>

  <section id="metrics" class="metrics" aria-live="polite">
    <div class="metric-top">
      <h2 id="metricsTitle">현재 탭 추정</h2>
      <button id="refreshMetrics" type="button">다시 계산</button>
    </div>
    <div id="metricMain" class="metric-main">계산 중</div>
    <div id="metricSub" class="metric-sub">팝업이 열려 있을 때만 계산합니다.</div>
    <div id="metricLines"></div>
    <div class="button-grid">
      <button id="applyFastPreset" type="button">빠른 초기 로딩 프리셋</button>
      <button id="reinjectPatch" type="button">패치 재주입</button>
    </div>
  </section>

  <section class="update-box" aria-live="polite">
    <div class="metric-top">
      <h2 id="mathTitle">Office 수식 복사</h2>
      <button id="copySelectedMath" type="button">선택 수식 복사</button>
    </div>
    <div id="mathCopyStatus" class="status-block">수식을 마우스로 드래그한 뒤 Ctrl/Cmd+C 또는 이 버튼을 사용합니다.</div>
  </section>

  <label><span id="enabledLabel">확장 기능 사용</span><input id="enabled" type="checkbox"></label>
  <label><span id="apiTrimEnabledLabel">초기 API 응답 줄이기</span><input id="apiTrimEnabled" type="checkbox"></label>
  <label><span id="safeNetworkModeLabel">네트워크 안전 모드</span><input id="safeNetworkMode" type="checkbox"></label>
  <label><span id="cssContainmentEnabledLabel">CSS 렌더링 containment</span><input id="cssContainmentEnabled" type="checkbox"></label>
  <label><span id="mathCopyEnabledLabel">Office 수식 복사 보정</span><input id="mathCopyEnabled" type="checkbox"></label>
  <label><span id="mathCopyAutoOnCopyLabel">Ctrl/Cmd+C 수식 자동 보정</span><input id="mathCopyAutoOnCopy" type="checkbox"></label>
  <label><span id="mathCopyShowSelectionButtonLabel">드래그 후 수식 복사 버튼</span><input id="mathCopyShowSelectionButton" type="checkbox"></label>
  <label><span id="mathCopyPreferPngFallbackLabel">PPT 안전 이미지 우선</span><input id="mathCopyPreferPngFallback" type="checkbox"></label>
  <label><span id="branchTrackerEnabledLabel">브랜치 경로 표시</span><input id="branchTrackerEnabled" type="checkbox"></label>
  <label><span id="nextPromptQueueEnabledLabel">다음 질문 대기 전송</span><input id="nextPromptQueueEnabled" type="checkbox"></label>
  <label><span id="nextPromptQueueShortcutLabel">대기 전송 단축키</span><input id="nextPromptQueueShortcut" type="text" spellcheck="false" placeholder="Tab"></label>
  <label><span id="showStatusLabel">상태 배지 표시</span><input id="showStatus" type="checkbox"></label>
  <label><span id="maintenanceEnabledLabel">대화 중 자동 정리</span><input id="maintenanceEnabled" type="checkbox"></label>
  <label><span id="autoCollapseLoadedMessagesLabel">불러온 과거 메시지 주기적 접기</span><input id="autoCollapseLoadedMessages" type="checkbox"></label>
  <label><span id="maintenanceIntervalSecLabel">자동 정리 주기(초)</span><input id="maintenanceIntervalSec" type="number" min="10" max="300" step="5"></label>

  <div class="row">
    <label><span id="visibleTurnsLabel">처음 표시할 최근 턴</span><input id="visibleTurns" type="number" min="1" max="20" step="1"></label>
    <label><span id="loadMoreBatchLabel">더 보기 배치</span><input id="loadMoreBatch" type="number" min="1" max="20" step="1"></label>
    <label><span id="prefetchBatchesLabel">API 사전 보관 배치</span><input id="prefetchBatches" type="number" min="0" max="30" step="1"></label>
    <label><span id="apiCacheEntriesLabel">응답 micro-cache 수</span><input id="apiCacheEntries" type="number" min="1" max="2" step="1"></label>
    <label><span id="apiCacheMaxKbLabel">캐시 항목 상한(KB)</span><input id="apiCacheMaxKb" type="number" min="128" max="4096" step="128"></label>
  </div>

  <label><span id="debugLabel">디버그 로그</span><input id="debug" type="checkbox"></label>
  <div class="doc-row">
    <button id="exportDebugLog" type="button">디버그 로그 파일 저장</button>
    <button id="clearDebugLog" type="button">로그 비우기</button>
  </div>

  <div id="saved"></div>
  <script src="popup.js"></script>
</body>
</html>
